<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Prompt AI">
    <meta name="theme-color" content="#1a1a2e">
    <title>Prompt Generator AI</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Prompt Generator</h1>
            <p class="subtitle">智能提示词生成工具</p>
        </header>

        <div class="input-section">
            <h2>📝 输入需求</h2>
            <textarea id="userInput" placeholder="输入你的需求，例如：写一个产品介绍视频脚本"></textarea>
        </div>

        <div class="button-group">
            <button id="generateBtn" class="btn btn-primary" onclick="generatePrompt()">
                ✨ 生成
            </button>
            <button id="optimizeBtn" class="btn btn-secondary" onclick="optimizePrompt()" disabled>
                🔧 优化
            </button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <h2>📤 生成结果</h2>
                <button id="copyBtn" class="btn btn-small" onclick="copyResult()" disabled>
                    📋 复制
                </button>
            </div>
            <div id="outputArea" class="output-area"></div>
        </div>

        <button class="btn btn-danger btn-clear" onclick="clearAll()">
            🗑️ 清空
        </button>

        <div id="status" class="status"></div>
    </div>

    <div class="settings-btn" onclick="showSettings()">⚙️</div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>🔑 API Key 设置</h2>
            <p class="modal-hint">请输入你的 MiniMax API Key</p>
            <input type="password" id="apiKeyInput" placeholder="输入 API Key">
            <div class="modal-buttons">
                <button class="btn btn-success" onclick="saveApiKey()">💾 保存</button>
                <button class="btn btn-primary" onclick="testApi()">🧪 测试</button>
                <button class="btn btn-secondary" onclick="closeSettings()">❌</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
